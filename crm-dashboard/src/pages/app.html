<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>신한라이프 AI 상담지원</title>
  <link rel="stylesheet" href="../styles/design-system/index.css">
  <style>
    /* ============================================================
       AppShell 토큰 (LNB / Header 디자인은 1·2·3 페이지와 동일)
       ============================================================ */
    :root {
      --app-expanded-w: 1920px;
      --app-compact-w: 1360px;
      --app-h: 1080px;
      --app-stage-w: var(--app-expanded-w);
      --app-stage-h: var(--app-h);
      --page1-collapse-reduction: 0px;
      --app-current-w: calc(var(--app-expanded-w) - var(--page1-collapse-reduction));
      /* 로컬 변수 복제 제거: 시맨틱 토큰을 그대로 사용 */
      --header-h: var(--layout-header-h);
      --lnb-w: var(--layout-lnb-w);
      --footer-h: var(--layout-footer-h, 40px);
      --shell-pad-x: var(--layout-header-pad-x);
      --shell-gap: var(--layout-header-gap);
      --lnb-pad-top: var(--layout-lnb-pad-top);
      --lnb-pad-bottom: var(--layout-lnb-pad-bottom);
      --lnb-brand-size: var(--layout-lnb-brand-size);
      --lnb-brand-gap: var(--layout-lnb-brand-gap);
      --lnb-nav-gap: var(--layout-lnb-nav-gap);
      --lnb-button-size: var(--layout-lnb-button-size);
      --lnb-visual-center-offset: calc(var(--layout-card-gap) / 2);
      --col-border: var(--color-border-default);
      --col-primary: var(--color-brand-primary);
      --font-stack: Pretendard, "Pretendard Variable", -apple-system, BlinkMacSystemFont,
                    "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    }

    :root.is-shell-compact {
      --page1-collapse-reduction: calc(var(--app-expanded-w) - var(--app-compact-w));
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%;
      min-width: 100%;
      min-height: 100vh;
      overflow: auto;
    }
    body {
      position: relative;
      display: grid;
      place-items: center;
      background: var(--layer-viewport-bg);
      color: var(--color-text-strong);
      font-family: var(--font-stack);
      font-size: var(--type-body-fs);
      line-height: var(--lh-normal);
      -webkit-font-smoothing: antialiased;
      isolation: isolate;
    }

    /* 1. 배경 이미지 레이어 (가장 뒤, 1920x1080 고정, 블러/opacity 미적용) */
    .app-desktop-bg {
      position: fixed;
      left: 50%;
      top: 50%;
      width: var(--app-stage-w);
      height: var(--app-stage-h);
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      background-color: var(--layer-viewport-bg);
      background-image: var(--desktop-bg-image, none);
      background-position: center;
      background-repeat: no-repeat;
      background-size: 1920px 1080px;
      border-radius: 16px;
    }

    /* 2. 앱 배경 레이어 — 단일 화이트 glass (--layer-app-bg + 동일 blur/saturate 토큰).
       LNB·헤더는 투명으로 두고 이 면만 깔아 경계가 생기지 않게 함 */
    .app-stage {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      width: var(--app-stage-w);
      height: var(--app-stage-h);
      overflow: hidden;
      border-radius: 16px;
      background: var(--layer-app-bg);
      backdrop-filter: blur(var(--glass-blur-app-shell)) saturate(var(--glass-saturate-app-shell));
      -webkit-backdrop-filter: blur(var(--glass-blur-app-shell)) saturate(var(--glass-saturate-app-shell));
      box-shadow: none;
    }
    .bg-switcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-pill);
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(var(--glass-blur-bg-switcher)) saturate(var(--glass-saturate-chrome));
      -webkit-backdrop-filter: blur(var(--glass-blur-bg-switcher)) saturate(var(--glass-saturate-chrome));
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.16);
    }
    .bg-switcher.is-hidden {
      display: none;
    }
    .bg-switcher__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: var(--radius-pill);
      color: rgba(255, 255, 255, 0.88);
      transition: background-color var(--motion-fast), color var(--motion-fast);
    }
    .bg-switcher__btn:hover {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
    }
    .bg-switcher__btn:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.72);
      outline-offset: 2px;
    }
    .bg-switcher__icon {
      display: block;
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; padding: 0; }

    /* ============================================================
       Shell (LNB full-height / Right = Header + Main + Footer)
       ============================================================ */
    .shell {
      display: grid;
      grid-template-columns: var(--lnb-w) minmax(0, 1fr);
      grid-template-rows: var(--header-h) minmax(0, 1fr);
      flex: 0 0 auto;
      width: 100%;
      height: 100%;
      max-height: 100%;
      overflow: hidden;
      background: transparent;
      box-shadow: none;
      transition: width 240ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* 상단 헤더: row 안의 top inset은 투명하게 두고, box는 실제 header content만 감싼다 */
    .shell__header {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      height: var(--header-h);
      padding: 12px var(--layout-card-gap) 0;
      box-sizing: border-box;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 0;
      outline: none;
      box-shadow: none;
    }
    .shell__body {
      display: contents;
    }
    .shell__lnb {
      grid-column: 1;
      grid-row: 1 / -1;
      width: var(--lnb-w);
      height: 100%;
      min-height: 0;
      border: 0;
      outline: none;
      box-shadow: none;
    }
    /* MainArea = MainContent(iframe), 푸터 없음 */
    .shell__main-area {
      grid-column: 2;
      grid-row: 2;
      flex: 1 1 auto;
      min-width: 0; min-height: 0;
      height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
      background: transparent;
    }
    .shell__main-content {
      flex: 1 1 auto;
      min-width: 0; min-height: 0;
      display: flex;
      overflow: hidden;
    }
    .shell__main-content iframe {
      flex: 1 1 auto;
      width: 100%; height: 100%;
      border: 0; margin: 0; padding: 0;
      display: block;
      background: transparent;
    }

    /* ============================================================
       Footer (statusbar) — AppShell 공통, activePage 무관 static
       ============================================================ */
    .statusbar {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: nowrap;
      gap: var(--space-md);
      height: var(--footer-h);
      min-height: var(--footer-h);
      padding: var(--space-sm) var(--space-xl);
      background: #DADFE4;
      color: #475569;
      font-size: var(--type-small-fs);
      font-weight: var(--fw-semibold);
      line-height: var(--lh-tight);
      font-variant-numeric: tabular-nums;
      overflow: hidden;
    }
    .statusbar__cluster {
      min-width: 0;
      display: flex; align-items: center; flex-wrap: nowrap; gap: var(--space-md);
      overflow: hidden;
    }
    .statusbar__item {
      display: inline-flex; align-items: center; gap: 4px;
    }
    .statusbar__item strong { color: #475569; font-weight: var(--fw-semibold); }
    .status-dot {
      width: 8px; height: 8px; border-radius: var(--radius-pill);
      background: var(--color-status-success);
      flex-shrink: 0;
    }
    .statusbar__keys {
      margin-left: auto;
      flex-shrink: 0;
      font-size: var(--type-small-fs); font-weight: var(--fw-medium);
      letter-spacing: 0.02em;
      color: #475569;
    }

    /* ============================================================
       Header (원본 SB 스타일 복원 — 모드 토글 중앙 / static UI)
       - .topbar: 3-구역 (modes 중앙, actions 우측)
       - 토글은 클릭 불가(static), 활성값은 "상담 모드 (통화 중)" 고정
       ============================================================ */
    .topbar {
      height: 54px;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--shell-gap);
      padding: 0 var(--layout-card-gap);
      /* 외곽 glass: .ds-outer-panel-glass */
      border: 0;
      border-radius: var(--radius-outer);
      box-shadow: none;
    }

    /* 좌측 통화 상태 영역 */
    .topbar__left {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    /* 통화 상태 pill */
    .call-status-pill {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      height: 36px;
      min-height: 36px;
      padding: 0 var(--space-md);
      border-radius: 999px;
      border: 1px solid rgba(16, 185, 129, 0.22);
      background: rgba(16, 185, 129, 0.12);
    }
    .call-status-pill__dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: #10B981;
      flex-shrink: 0;
    }
    .call-status-pill__text {
      font-size: var(--type-body-fs);
      font-weight: var(--fw-semibold);
      line-height: var(--lh-tight);
      color: #047857;
      white-space: nowrap;
    }

    /* 중앙 모드 토글 영역 */
    .topbar__modes {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .mode-segmented {
      --mode-tab-1-w: 160px;
      --mode-tab-2-w: 112px;
      display: inline-grid;
      grid-template-columns: var(--mode-tab-1-w) var(--mode-tab-2-w);
      align-items: center;
      column-gap: 0;
      padding: 3px;
      background: rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-radius: 999px;
      box-sizing: border-box;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
      position: relative;
      overflow: hidden;
      pointer-events: none; /* static UI — 클릭 비활성 */
    }
    .mode-segmented::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: var(--mode-tab-1-w);
      height: var(--control-h-md);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      transform: translateX(0);
      transition:
        transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
        width 220ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .mode-segmented:has(.mode-segmented__btn:nth-child(2).is-active)::before {
      width: var(--mode-tab-2-w);
      transform: translateX(var(--mode-tab-1-w));
    }
    .mode-segmented__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      height: var(--control-h-md);
      padding: 0 var(--space-md);
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: var(--type-body-fs);
      font-weight: var(--fw-semibold);
      line-height: 1;
      letter-spacing: 0.02em;
      color: rgba(30, 41, 59, 0.48);
      opacity: 1;
      background: transparent;
      box-sizing: border-box;
      white-space: nowrap;
      cursor: default;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 120ms, color 160ms;
    }
    .mode-segmented__btn.is-active {
      background: transparent;
      color: rgba(15, 23, 42, 0.92);
      opacity: 1;
      font-weight: var(--fw-bold);
    }
    .mode-segmented__btn:not(.is-active):hover {
      color: rgba(30, 41, 59, 0.68);
    }

    /* 우측 사용자 영역 */
    .topbar__actions {
      --topbar-action-h: calc(var(--control-h-md) + 6px);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-shrink: 0;
      min-width: 0;
      height: var(--topbar-action-h);
    }
    .topbar__icon-btn,
    .topbar__avatar {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: var(--topbar-action-h);
      height: var(--topbar-action-h);
      min-width: var(--topbar-action-h);
      min-height: var(--topbar-action-h);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-control);
      background: var(--color-surface-card);
      color: var(--color-text-muted);
      transition:
        background var(--motion-fast),
        border-color var(--motion-fast),
        color var(--motion-fast);
    }
    .topbar__icon-btn {
      cursor: pointer;
      text-decoration: none;
      border-radius: var(--radius-pill);
    }
    .topbar__icon-btn:hover,
    .topbar__avatar:hover {
      background: var(--color-surface-soft);
      border-color: var(--color-border-strong);
      color: var(--color-text-secondary);
    }
    .topbar__icon-btn:focus-visible {
      outline: 2px solid var(--c-neutral-400);
      outline-offset: 2px;
    }
    .topbar__user-group {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      height: var(--topbar-action-h);
      padding: 0 10px 0 0;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-control);
      background: var(--color-surface-card);
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .topbar__user-group .topbar__avatar {
      width: calc(var(--topbar-action-h) - 2px);
      height: calc(var(--topbar-action-h) - 2px);
      min-width: calc(var(--topbar-action-h) - 2px);
      min-height: calc(var(--topbar-action-h) - 2px);
      border: 0;
      border-radius: var(--radius-control);
      background: transparent;
    }
    .topbar__user-group .topbar__avatar:hover {
      background: transparent;
      border-color: transparent;
      color: inherit;
    }
    .topbar__user-group:hover {
      background: var(--color-surface-soft);
      border-color: var(--color-border-strong);
      color: var(--color-text-secondary);
    }
    .topbar__user-group .topbar__user-name {
      margin-left: 0;
    }
    .topbar__icon {
      width: 16px;
      height: 16px;
      display: block;
    }
    .topbar__user-name {
      margin-left: 2px;
      font-size: var(--type-body-fs);
      font-weight: var(--fw-semibold);
      line-height: var(--lh-tight);
      color: var(--color-text-strong);
      white-space: nowrap;
    }

    /* ============================================================
       LNB (placeholder 단순화 — 4개 메뉴, responsive width)
       ============================================================ */
    /* LNB: app-stage 단일 면에 포함(우측 경계선·독립 유리판 느낌 제거) */
    .lnb {
      width: 100%; height: 100%;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: var(--lnb-pad-top) 0 var(--lnb-pad-bottom);
      display: flex; flex-direction: column; align-items: center; gap: 0;
      border: 0;
      box-shadow: none;
    }
    .lnb__brand {
      flex-shrink: 0;
      width: var(--lnb-brand-size);
      height: var(--lnb-brand-size);
      margin: 0 0 var(--lnb-brand-gap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgb(255 255 255 / 32%);
      border-radius: var(--radius-circle);
      background: rgb(255 255 255 / 18%);
      box-shadow: none;
      overflow: hidden;
      transform: translateX(var(--lnb-visual-center-offset));
    }
    .lnb__brand-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* 중앙 메뉴: 단일 세로형 glass tab group */
    .lnb__nav {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lnb__tab-group {
      box-sizing: border-box;
      width: var(--lnb-button-size);
      padding: 0;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, 0.32);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 0;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      transform: translateX(var(--lnb-visual-center-offset));
      position: relative;
    }
    .lnb__tab-group::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: calc(var(--lnb-button-size) - 6px);
      height: calc(var(--lnb-button-size) - 6px);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 4px 12px rgba(20, 30, 50, 0.06);
      transform: translateY(0);
      transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .lnb__tab-group[data-active-index="1"]::before {
      transform: translateY(var(--lnb-button-size));
    }
    .lnb__tab-group[data-active-index="2"]::before {
      transform: translateY(calc(var(--lnb-button-size) + var(--lnb-button-size)));
    }
    .lnb__tab-group[data-active-index="3"]::before {
      transform: translateY(calc(var(--lnb-button-size) * 3));
    }
    .lnb__btn {
      box-sizing: border-box;
      width: var(--lnb-button-size);
      height: var(--lnb-button-size);
      min-width: var(--lnb-button-size);
      min-height: var(--lnb-button-size);
      padding: 0;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--color-text-secondary);
      opacity: 0.55;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 var(--lnb-button-size);
      position: relative;
      z-index: 1;
      line-height: 0;
      transition: opacity 120ms, color 160ms;
    }
    .lnb__btn:hover {
      background: transparent;
      color: var(--color-text-secondary);
      opacity: 0.75;
    }
    .lnb__btn.is-active {
      background: transparent;
      color: var(--color-text-strong);
      opacity: 1;
      box-shadow: none;
    }
    .lnb__btn:disabled,
    .lnb__btn[aria-disabled="true"] {
      cursor: default;
      pointer-events: none;
    }
    .lnb__icon {
      display: block;
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      color: currentColor;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .lnb__btn.is-active .lnb__icon,
    .lnb__btn.is-active .lnb__icon * {
      stroke: url(#lnb-active-icon-gradient);
    }
    .lnb-collapse-btn {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 var(--lnb-button-size);
      width: var(--lnb-button-size);
      height: var(--lnb-button-size);
      min-width: var(--lnb-button-size);
      min-height: var(--lnb-button-size);
      margin: 0 auto;
      padding: 0;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-pill);
      background: var(--color-surface-card);
      color: var(--color-surface-footer);
      box-shadow: none;
      transform: translateX(var(--lnb-visual-center-offset));
      transition: background 120ms, border-color 120ms, color 120ms;
    }
    .lnb-collapse-btn:hover {
      background: var(--c-neutral-50);
      border-color: var(--color-border-default);
      color: var(--color-surface-footer);
    }
    .lnb-collapse-btn:focus-visible {
      outline: 2px solid var(--c-neutral-400);
      outline-offset: 2px;
    }
    .lnb-collapse-btn__icon {
      display: block;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: currentColor;
      pointer-events: none;
    }
    .lnb-collapse-btn__icon rect,
    .lnb-collapse-btn__icon path {
      stroke: currentColor;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute; overflow:hidden;">
    <defs>
      <linearGradient id="lnb-active-icon-gradient" x1="2" y1="12" x2="22" y2="12" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#5785FB"/>

  <script>
    /**
     * AppShell 상태:
     *  - activePage 는 AppShell 만 소유
     *  - LNB 클릭만 setActivePage 를 호출
     *  - Header 는 activePage 를 받지 않음 (재렌더 없음)
     *  - MainContent(iframe) src 만 교체
     *  - URL hash (#page=2) 또는 query (?page=2) 로 초기 페이지 지정 가능
     */
    (function () {
      var PAGES = {
        '1': 'index.html',
        '2': 'document-generator.html',
        '3': 'inspection-review.html',
        '4': 'style-guide.html'
      };
      var frame = document.getElementById('page-frame');
      var buttons = document.querySelectorAll('.lnb__btn[data-page]');
      var lnbTabGroup = document.querySelector('.lnb__tab-group');
      var lnbCollapseBtn = document.getElementById('lnb-collapse-btn');
      var backgroundImages = [
        '../assets/bg/desktop-blue-wave.png'
      ];
      var bgIndex = 0;
      var bgSwitcher = document.getElementById('bg-switcher');
      var bgPrevBtn = document.getElementById('bg-prev');
      var bgNextBtn = document.getElementById('bg-next');

      function applyBackground(index) {
        if (!backgroundImages.length) return;
        bgIndex = (index + backgroundImages.length) % backgroundImages.length;
        document.documentElement.style.setProperty(
          '--desktop-bg-image',
          'url("' + backgroundImages[bgIndex] + '")'
        );
      }

      function readInitialPage() {
        var m = (location.hash || '').match(/page=(\d)/);
        if (m && PAGES[m[1]]) return m[1];
        m = (location.search || '').match(/page=(\d)/);
        if (m && PAGES[m[1]]) return m[1];
        return '1';
      }

      var activePage = readInitialPage();
      applyBackground(0);

      function applyActive(page, opts) {
        opts = opts || {};
        activePage = page;
        document.documentElement.classList.remove('is-shell-compact');
        document.documentElement.style.setProperty('--page1-collapse-reduction', '0px');
        var activeIndex = 0;
        buttons.forEach(function (btn, index) {
          var on = btn.dataset.page === page;
          btn.classList.toggle('is-active', on);
          if (on) activeIndex = index;
          if (on) btn.setAttribute('aria-current', 'page');
          else btn.removeAttribute('aria-current');
        });
        if (lnbTabGroup) lnbTabGroup.dataset.activeIndex = String(activeIndex);
        if (opts.swapFrame !== false) frame.src = PAGES[page];
        if (opts.updateHash !== false) {
          try { history.replaceState(null, '', '#page=' + page); } catch (_) {}
        }
      }

      // 초기 페이지: src 가 다르면 교체, 같으면 그대로 둔다
      applyActive(activePage, { swapFrame: frame.getAttribute('src') !== PAGES[activePage] });

      function setActive(page) {
        if (!PAGES[page] || page === activePage) return;
        applyActive(page);
      }

      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          setActive(btn.dataset.page);
        });
      });

      if (bgSwitcher && backgroundImages.length <= 1) {
        bgSwitcher.classList.add('is-hidden');
      }
      if (bgPrevBtn) {
        bgPrevBtn.addEventListener('click', function () {
          applyBackground(bgIndex - 1);
        });
      }
      if (bgNextBtn) {
        bgNextBtn.addEventListener('click', function () {
          applyBackground(bgIndex + 1);
        });
      }

      if (lnbCollapseBtn) {
        lnbCollapseBtn.addEventListener('click', function () {
          var collapsed = !document.documentElement.classList.contains('is-lnb-collapsed');
          document.documentElement.classList.toggle('is-lnb-collapsed', collapsed);
          lnbCollapseBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          lnbCollapseBtn.setAttribute('aria-label', collapsed ? 'LNB 펼치기' : 'LNB 접기');
          lnbCollapseBtn.setAttribute('title', collapsed ? 'LNB 펼치기' : 'LNB 접기');
        });
      }

      // 뒤로/앞으로 또는 외부 hash 변경 시 동기화
      window.addEventListener('hashchange', function () {
        var p = readInitialPage();
        if (p !== activePage) applyActive(p, { updateHash: false });
      });

      window.addEventListener('message', function (event) {
        var data = event && event.data;
        if (!data) return;
        if (data.type === 'crm:page1-collapse-state') {
          var reduction = Number(data.widthReduction || 0);
          if (!isFinite(reduction) || reduction < 0) reduction = 0;
          document.documentElement.classList.remove('is-shell-compact');
          document.documentElement.style.setProperty('--page1-collapse-reduction', reduction.toFixed(1) + 'px');
          return;
        }
        if (data.type === 'crm:page1-info-panel') {
          document.documentElement.classList.remove('is-shell-compact');
          document.documentElement.style.setProperty('--page1-collapse-reduction', data.expanded === false ? '369px' : '0px');
        }
      });
    })();
  </script>
